<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Projeto Loja</title>
</head>
<body>
    <header>
        <p class="logo">Loja<span>Tempestade</span></p>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <div class="carrinho">
            <span id="item">Itens:0</span>
        </div>
    </header>

    <main id="container">
        <h2>Produtos em Destaques</h2>

        <section class="card">

            <div class="card-game">
                <img src="./src/assets/produto1.png" alt="Tempestade PoP! Vigésimo aniversário do X-men">
                <article class="card-content">
                    <h3> Tempestade PoP! <p class="subtitulo">Versão 20° aniversário</p> </h3>
                    <p class="preco">R$ 299,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>

            <div class="card-game">
                <img src="./src/assets/produto2.png" alt="Funko PoP! Tempestade brilhante no escuro">
                <article class="card-content">
                    <h3> Tempestade PoP! <p class="subtitulo">Versão que brilha no escuro</p> </h3>
                    <p class="preco">R$ 289,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>

            <div class="card-game">
                <img src="./src/assets/produto3.png" alt="Funko Tempestade Natalina">
                <article class="card-content">
                    <h3>Tempestade PoP! <p class="subtitulo">Versão Natal</p></h3>
                    <p class="preco">R$ 279,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Direitos Reservados</p>
    </footer>

</body>
</html>
